<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - Stackly</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:80px 20px 30px;
  background:linear-gradient(135deg,#050816,#0a1226);
  font-family:'Rajdhani',sans-serif;
}
.back-btn{
  position:fixed;
  top:22px;
  left:22px;
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:11px 16px;
  border-radius:999px;
  border:1px solid rgba(0,245,255,.35);
  background:rgba(255,255,255,.06);
  color:#fff;
  text-decoration:none;
  font-weight:700;
  box-shadow:0 0 20px rgba(0,245,255,.12);
  transition:.3s;
  z-index:10;
}
.back-btn:hover{transform:translateY(-2px);background:rgba(0,245,255,.14);color:#00F5FF}
.signup-card{
  width:100%;
  max-width:520px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(0,245,255,.2);
  border-radius:24px;
  padding:40px;
  backdrop-filter:blur(15px);
  box-shadow:0 0 40px rgba(0,245,255,.12);
}
.logo{text-align:center;margin-bottom:20px}
.signup-logo-img{height:70px;max-width:260px;width:auto;object-fit:contain}
h2{color:#fff;text-align:center;margin-bottom:10px;font-family:'Orbitron',sans-serif}
.sub{text-align:center;color:#9aa6b2;margin-bottom:30px}
.form-group{margin-bottom:18px}
label{display:block;color:#fff;margin-bottom:8px;font-weight:600}
input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.05);
  color:#fff;
  outline:none;
}
input:focus{border-color:#00F5FF;box-shadow:0 0 0 3px rgba(0,245,255,.12)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.signup-btn{
  width:100%;
  padding:15px;
  border:none;
  border-radius:12px;
  background:#00F5FF;
  color:#000;
  font-weight:800;
  cursor:pointer;
  margin-top:10px;
  transition:.3s;
  font-size:1rem;
}
.signup-btn:hover{transform:translateY(-2px);box-shadow:0 0 20px rgba(0,245,255,.5)}
.message{
  display:none;
  margin-top:16px;
  padding:12px 14px;
  border-radius:12px;
  background:rgba(0,245,255,.12);
  border:1px solid rgba(0,245,255,.25);
  color:#dffcff;
  text-align:center;
  font-weight:600;
}
.message.show{display:block}
.login-link{text-align:center;margin-top:20px;color:#9aa6b2}
.login-link a{color:#00F5FF;text-decoration:none;font-weight:700}
@media(max-width:600px){
  body{padding:74px 14px 24px}
  .back-btn{top:14px;left:14px;padding:9px 13px;font-size:.95rem}
  .signup-logo-img{height:55px;max-width:220px}
  .signup-card{padding:25px;border-radius:20px}
  .row{grid-template-columns:1fr;gap:0}
}
</style>
</head>
<body>
<a href="index.html" class="back-btn">← Back</a>

<div class="signup-card">
  <div class="logo">
    <img src="assets/logo-dark.webp" alt="Stackly Logo" class="signup-logo-img">
  </div>

  <h2>Create Account</h2>
  <p class="sub">Join the Stackly esports community</p>

  <form id="signupForm">
    <div class="row">
      <div class="form-group">
        <label>First Name</label>
        <input type="text" required>
      </div>
      <div class="form-group">
        <label>Last Name</label>
        <input type="text" required>
      </div>
    </div>

    <div class="form-group">
      <label>Gamertag</label>
      <input type="text" required>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" required>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" required>
    </div>

    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="confirmPassword" required>
    </div>

    <button type="submit" class="signup-btn">Create Account</button>
  </form>

  <div id="signupMessage" class="message">Account created successfully! Opening dashboard...</div>

  <div class="login-link">
    Already have an account? <a href="index.html">Go to home</a>
  </div>
</div>

<script>
document.getElementById('signupForm').addEventListener('submit', function(e){
  e.preventDefault();
  const inputs = Array.from(this.querySelectorAll('input'));
  const empty = inputs.some(input => !input.value.trim());
  if(empty){
    alert('Please fill all the boxes before continuing.');
    return;
  }

  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirmPassword').value;

  if(password !== confirmPassword){
    alert('Password and Confirm Password must match.');
    return;
  }

  document.getElementById('signupMessage').classList.add('show');
  this.reset();
  setTimeout(() => {
    window.location.href = 'dashboard.html';
  }, 1200);
});
</script>
</body>
</html>
